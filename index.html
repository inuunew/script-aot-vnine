<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo to URL Converter</title>
    <style>
        :root { --primary: #7289da; --bg: #2c2f33; --text: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #23272a; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        input[type="file"] { margin: 20px 0; color: #ccc; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #5b6eae; }
        button:disabled { background: #4f545c; cursor: not-allowed; }
        .result-box { margin-top: 20px; padding: 10px; background: #2f3136; border-radius: 4px; display: none; word-break: break-all; }
        #urlLink { color: #00b0f4; text-decoration: none; font-size: 0.9rem; }
        .loader { display: none; margin: 10px 0; font-size: 0.8rem; color: #faa61a; }
    </style>
</head>
<body>

<div class="card">
    <h2>Photo ➔ URL</h2>
    <p style="font-size: 0.8rem; color: #99aab5;">Unggah foto untuk mendapatkan link Catbox</p>
    
    <input type="file" id="fileInput" accept="image/*">
    <button id="uploadBtn">Generate URL</button>

    <div id="loader" class="loader">Sedang mengunggah ke Catbox...</div>

    <div id="resultBox" class="result-box">
        <p style="margin-top:0; font-size: 0.8rem;">Link Berhasil Dibuat:</p>
        <a id="urlLink" href="#" target="_blank"></a>
        <button onclick="copyURL()" style="margin-top: 10px; background: #43b581; padding: 5px; font-size: 0.7rem;">Salin Link</button>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const resultBox = document.getElementById('resultBox');
    const urlLink = document.getElementById('urlLink');
    const loader = document.getElementById('loader');

    uploadBtn.addEventListener('click', async () => {
        if (!fileInput.files[0]) return alert("Pilih file dulu!");

        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append('reqtype', 'fileupload');
        // Masukkan Userhash Anda di bawah jika ingin masuk ke akun pribadi, 
        // jika dikosongkan akan menjadi anonim (tetap jadi URL).
        formData.append('userhash', ''); 
        formData.append('fileToUpload', file);

        // UI State
        uploadBtn.disabled = true;
        loader.style.display = 'block';
        resultBox.style.display = 'none';

        try {
            // Menggunakan proxy cors-anywhere untuk bypass kebijakan CORS browser
            const proxy = "https://is-cors-anywhere.fly.dev/"; 
            const target = "https://catbox.moe/user/api.php";

            const response = await fetch(proxy + target, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const link = await response.text();
                urlLink.href = link;
                urlLink.innerText = link;
                resultBox.style.display = 'block';
            } else {
                alert("Gagal mengunggah. Coba lagi nanti.");
            }
        } catch (err) {
            console.error(err);
            alert("Terjadi kesalahan koneksi.");
        } finally {
            uploadBtn.disabled = false;
            loader.style.display = 'none';
        }
    });

    function copyURL() {
        const text = urlLink.innerText;
        navigator.clipboard.writeText(text);
        alert("Link tersalin!");
    }
</script>

</body>
</html>
